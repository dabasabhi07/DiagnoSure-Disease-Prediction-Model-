<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Diagnosure — Chat</title>
  <link rel="stylesheet" href="css/styles-chat.css" />
    <link rel="icon" type="image/png" href="assets/logo.jpg">
</head>
<body>
  <main class="chat-container">
    <header class="header">
      <div class="brand">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="22" height="22" rx="6" fill="#e8f5ff"/><path d="M7 12c1.5-2 3.5-3 5-3s3.5 1 5 3" stroke="#0b66ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="15.5" r="1.7" fill="#0b66ff"/></svg>
        <div>
          <h1>Diagnosure</h1>
          <p class="subtitle">Tell us your symptoms — quick check</p>
        </div>
      </div>
      <div><button id="logout" class="btn outline">Logout</button></div>
    </header>

    <section class="main">
      <aside class="left">
        <div class="profile-card">
          <h3 id="user-name">Hello!</h3>
          <p id="user-meta" class="muted">Complete your profile for better suggestions</p>
        </div>
<!-- ---------- Symptom Selector Panel ---------- -->
<div class="symptom-panel">
  <label>Select your symptoms</label>

  <!-- Search box -->
  <input type="text" id="symptom-search" placeholder="Search symptoms..." />

  <!-- Accordion symptom list (auto-filled from training.csv) -->
  <div id="symptom-accordion" class="accordion">
    <p class="muted" style="text-align:center;">Loading symptoms...</p>
  </div>

  <!-- Hidden select (kept for compatibility with your JS) -->
  <select id="symptom-select" multiple style="display:none;"></select>

  <!-- Optional free-text input -->
  <input type="text" id="symptom-free" placeholder="Or type symptoms (comma-separated)" />

  <div class="row">
    <button id="send-symptoms" class="btn primary">Send Symptoms</button>
    <button id="clear-symptoms" class="btn outline">Clear</button>
  </div>
</div>

          
      </aside>

      <section class="chat-area">
        <div id="chat-log" class="chat-log">
          <div class="bot-msg">Hi! Select symptoms or type them and click "Send to Backend".</div>
        </div>

        <div class="quick-actions">
          <button id="btn-health-tips" class="btn outline">Health tips</button>
          <button id="btn-emergency" class="btn outline">Emergency advise</button>
        </div>

      </section>
    </section>
  </main>

  <script src="js/chat.js"></script>
</body>
</html>
