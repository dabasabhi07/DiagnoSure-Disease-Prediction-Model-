<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Diagnosure — Login</title>
  <link rel="stylesheet" href="css/styles-login.css" />
  <link rel="icon" type="image/png" href="assets/logo.jpg">
</head>
<body>
  <main class="container">
    <header class="brand">
      <!-- Simple inline SVG logo -->
      <div class="logo" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="22" height="22" rx="6" fill="#e8f5ff"/>
          <path d="M7 12c1.5-2 3.5-3 5-3s3.5 1 5 3" stroke="#0b66ff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="15.5" r="1.7" fill="#0b66ff"/>
        </svg>
      </div>
      <h1>Diagnosure</h1>
      <p class="subtitle">Your quick health assistant</p>
    </header>

    <section class="card">
      <h2>Welcome — Sign in or Sign up</h2>

      <div class="auth-methods">
        <div class="method">
          <label for="phone">Phone</label>
          <input id="phone" type="tel" placeholder="+91 98765 43210" />
          <div class="row">
            <button id="send-sms-otp" class="btn primary">Send SMS OTP</button>
            <button id="simulate-sms-otp" class="btn outline">Simulate OTP</button>
          </div>
        </div>

        <div class="divider">OR</div>

        <div class="method">
          <label>Sign in with Gmail</label>
          <div class="row">
            <button id="gmail-otp" class="btn google">Send Gmail OTP</button>
            <button id="simulate-gmail" class="btn outline">Simulate Gmail OTP</button>
          </div>
          <p class="muted">Gmail OAuth is simulated here for demo purposes.</p>
        </div>
      </div>

      <div id="otp-section" class="otp hidden">
        <label for="otp-input">Enter OTP</label>
        <input id="otp-input" type="text" placeholder="123456" maxlength="6" />
        <div class="row">
          <button id="verify-otp" class="btn primary">Verify</button>
          <button id="resend-otp" class="btn link">Resend</button>
        </div>
        <p id="otp-info" class="muted">OTP simulated as <strong id="otp-code-display">123456</strong></p>
      </div>

      <p class="muted small">By continuing you agree to Terms & Privacy.</p>
    </section>

    <footer class="footer">
      <p>New user? <a href="profile.html" id="to-profile">Fill your profile after sign-up</a></p>
    </footer>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
